<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HPC Billing Report</title>
<style>
  :root{
    --ink:#1a1d21; --muted:#5c6470; --line:#d9dde3; --line-soft:#eceef1;
    --accent:#1f4e79; --accent-soft:#eef3f8; --warn-bg:#fff7e0; --warn-line:#e6c65a;
    --paper:#ffffff; --bg:#f2f4f6;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:14px}
  .toolbar{background:var(--accent);color:#fff;padding:14px 22px;display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}
  .toolbar h1{font-size:16px;margin:0 14px 6px 0;font-weight:600;letter-spacing:.3px}
  .field{display:flex;flex-direction:column;gap:3px}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;opacity:.85}
  select,button,input[type=date]{font:inherit}
  select{padding:7px 10px;border:none;border-radius:5px;min-width:230px;background:#fff;color:var(--ink)}
  input[type=date]{padding:6px 8px;border:none;border-radius:5px;background:#fff;color:var(--ink)}
  .btn{padding:8px 16px;border:none;border-radius:5px;background:#fff;color:var(--accent);font-weight:600;cursor:pointer}
  .btn:hover{background:#e8eef5}
  .btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.55)}
  .btn.ghost:hover{background:rgba(255,255,255,.12)}
  .btn.mini{padding:6px 10px;font-size:12px}
  .presets{display:flex;gap:6px;align-items:flex-end}
  .banner{padding:9px 22px;font-size:13px}
  .banner.warn{background:var(--warn-bg);border-bottom:1px solid var(--warn-line)}
  .banner.ok{background:#e8f3e9;border-bottom:1px solid #bcd8bf;color:#22522a}
  .banner.err{background:#fdeaea;border-bottom:1px solid #e3a6a6;color:#7a1f1f}
  #reportWrap{max-width:960px;margin:26px auto 60px;background:var(--paper);box-shadow:0 1px 6px rgba(0,0,0,.12);padding:38px 46px}
  .placeholder{max-width:960px;margin:60px auto;text-align:center;color:var(--muted);font-size:15px}

  .rep-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--accent);padding-bottom:14px;margin-bottom:6px}
  .rep-head h2{margin:0;font-size:21px;color:var(--accent)}
  .rep-head .sub{color:var(--muted);margin-top:3px}
  .rep-head .month{text-align:right}
  .rep-head .month .m{font-size:17px;font-weight:700}
  .rep-head .month .g{font-size:11.5px;color:var(--muted);margin-top:3px}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 34px;padding:14px 0 6px;border-bottom:1px solid var(--line);margin-bottom:20px}
  .info-grid .cell{display:flex;gap:8px;padding:3px 0}
  .info-grid .k{width:92px;flex:none;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding-top:2px}
  .info-grid .v{font-weight:600}

  h3.sec{font-size:12.5px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin:26px 0 8px;border-bottom:1px solid var(--line);padding-bottom:5px}
  table{width:100%;border-collapse:collapse}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:left;padding:7px 8px;border-bottom:2px solid var(--line)}
  td{padding:8px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  td.qty{font-weight:700}
  tr.total-row td{border-top:2px solid var(--line);border-bottom:none;font-weight:700;background:var(--accent-soft)}
  .unit{color:var(--muted)}
  .proj-input{width:95px;padding:5px 7px;border:1px solid var(--line);border-radius:4px;text-align:right;font:inherit}
  .proj-input:focus{outline:2px solid var(--accent);border-color:var(--accent)}
  td.billtotal{font-weight:700;color:var(--accent)}
  .none-note{color:var(--muted);font-style:italic;padding:10px 4px}
  .remove-x{border:none;background:none;color:#b04a4a;cursor:pointer;font-size:15px;padding:0 4px;line-height:1}

  .addproj{margin-top:10px;display:flex;gap:8px;align-items:center}
  .addproj select{border:1px solid var(--line);min-width:280px}
  .addproj .btn{background:var(--accent);color:#fff}
  .addproj .btn:hover{background:#173a5a}

  .concrete{margin-top:34px;border:2px solid var(--accent);border-radius:6px;overflow:hidden}
  .concrete .cap{background:var(--accent);color:#fff;padding:8px 14px;font-size:12.5px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
  .concrete table{margin:0}
  .concrete td,.concrete th{padding:8px 14px}

  .review{margin-top:26px;background:var(--warn-bg);border:1px solid var(--warn-line);border-radius:6px;padding:12px 16px}
  .review b{display:block;margin-bottom:6px}
  .review ul{margin:0;padding-left:18px}

  .sig{display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-top:52px}
  .sig .line{border-top:1px solid var(--ink);padding-top:5px;font-size:11.5px;color:var(--muted)}
  .foot{margin-top:30px;font-size:11px;color:var(--muted);display:flex;justify-content:space-between}

  #diag{max-width:960px;margin:20px auto;background:#fff;border:1px solid var(--line);border-radius:6px;padding:16px 20px;font-size:12.5px}
  #diag h4{margin:12px 0 6px;color:var(--accent)}
  #diag table{font-size:12px}
  #diag td,#diag th{padding:4px 8px}
  #diag .mapped{color:#2e7d32;font-weight:600}
  #diag .unmapped{color:#b04a4a;font-weight:600}

  @media print{
    body{background:#fff}
    .toolbar,.banner,.addproj,.no-print,.remove-x,#diag{display:none !important}
    #reportWrap{box-shadow:none;margin:0;max-width:none;padding:0}
    .proj-input{border:none;font-weight:700;text-align:right;width:80px}
    .review{display:none}
    @page{margin:16mm}
  }
</style>
</head>
<body>

<div class="toolbar no-print">
  <h1>HPC Billing Report</h1>
  <div class="field">
    <label for="jobSel">Job</label>
    <select id="jobSel"><option value="">loading…</option></select>
  </div>
  <div class="field">
    <label for="startD">From</label>
    <input type="date" id="startD">
  </div>
  <div class="field">
    <label for="endD">Through</label>
    <input type="date" id="endD">
  </div>
  <div class="presets">
    <button class="btn ghost mini" onclick="preset('last')">Last month</button>
    <button class="btn ghost mini" onclick="preset('this')">This month</button>
    <button class="btn ghost mini" onclick="preset('all')">All entries</button>
  </div>
  <button class="btn" id="printBtn">Print / Save PDF</button>
  <button class="btn ghost" id="reloadBtn">Refresh data</button>
  <button class="btn ghost mini" id="diagBtn">Data check</button>
</div>
<div id="banner"></div>
<div id="diag" style="display:none"></div>
<div id="out" class="placeholder">Loading data from SharePoint…</div>

<script>
/* ================= CONFIG =================
   Same convention as the other HPC field forms.
   map.* = optional manual column overrides for the report header.
   Leave null to auto-detect; open "Data check" in the app to see the
   real column names, then set them here if the auto-detect guessed wrong.
   =========================================== */
const CONFIG = {
  flowUrl: "https://default7255d6425eff4581966d707a3a5308.22.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/07/workflows/6f19392f03c34c24a5a3485c3286d98a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=oLQKpOyfLejIdVbMRtFRyxGNVm0b9n0vKEliznamO84",
  apiKey: "Princeton",
  lists: { items: "JobItems", daily: "DailyQuantities", co: "ChangeOrderLog", jobs: "Jobs", clients: "Clients" },
  map: {
    // Pinned to the real list schemas (verified 7/22/26 from list exports):
    // Jobs: Title=JobNumber, field_1=JobName, field_2=Client (name), field_3=Address, field_4=Status
    // Clients: Title=Name, AddressBlock=print block (not used by this report)
    jobsClient: "field_2",  // Jobs list column holding the client name
    jobsAddress: "field_3", // Jobs list column holding the site address
    jobsCity: null,         // (address column already includes city/state)
    clientsKey: "Title",    // Clients list column that matches the Jobs client value
    clientsName: "Title"    // Clients list column holding the client display name
  }
};

/* ---------- SharePoint bridge (same as field forms) ---------- */
async function sp(method, uri, body){
  const res = await fetch(CONFIG.flowUrl, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ key: CONFIG.apiKey, method: method, uri: uri, body: body ? JSON.stringify(body) : "" })
  });
  const text = await res.text();
  let data = {};
  try { data = text ? JSON.parse(text) : {}; } catch(e){ throw new Error("Bad response from bridge"); }
  if (data && data.ok === false) throw new Error(data.error || "Bridge error");
  if (!res.ok) throw new Error("HTTP " + res.status);
  return data;
}
function spList(listTitle){ return "_api/web/lists/getbytitle('" + encodeURIComponent(listTitle) + "')"; }
function spQuote(v){ return String(v).replace(/'/g, "''"); }
async function spGetAll(listTitle, query){
  let uri = spList(listTitle) + "/items?" + query;
  let out = [];
  for (let guard = 0; uri && guard < 50; guard++){
    const data = await sp("GET", uri);
    out = out.concat(data.value || []);
    let next = data["odata.nextLink"] || data["@odata.nextLink"] || null;
    if (next){ const i = next.indexOf("_api/"); uri = i >= 0 ? next.slice(i) : null; }
    else uri = null;
  }
  return out;
}

/* ---------- state ---------- */
let JOBS = [];        // Jobs list rows (all columns)
let JOBITEMS = [];    // normalized {job,name,section,item,unit,contractQty}
let CLIENTS = [];     // Clients list rows (all columns)
let DAILY_CACHE = {}; // jobNumber -> normalized entries [{date,item,qty,unit,foreman,notes}]
let MAP = {};         // resolved column mapping
let projections = {};
let extraProjRows = {};

const $ = id => document.getElementById(id);
function banner(msg, cls){ $("banner").innerHTML = msg ? `<div class="banner ${cls}">${msg}</div>` : ""; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }
function fmt(n){ return Number(n).toLocaleString("en-US",{maximumFractionDigits:2}); }
function dataCols(row){
  return Object.keys(row||{}).filter(k =>
    !/^(odata|@odata|__|Id$|ID$|GUID|Attachments|Author|Editor|Created|Modified|ContentType|EditLink|_)/i.test(k)
    && !/odata/i.test(k) && typeof row[k] !== "object");
}

/* ---------- column auto-detection ---------- */
function detectMap(){
  const m = Object.assign({}, CONFIG.map);
  const jRow = JOBS[0] || {};
  const jCols = dataCols(jRow);
  const cRow = CLIENTS[0] || {};
  const cCols = dataCols(cRow);
  const jVals = col => JOBS.map(r => r[col]).filter(v => v != null && v !== "");

  const looksAddress = v => typeof v === "string" && /\d/.test(v) && /[a-z]/i.test(v) && v.trim().includes(" ");
  const looksCity = v => typeof v === "string" && /,\s*[A-Z]{2}\b/.test(v);

  if (!m.jobsClient){
    m.jobsClient = jCols.find(k => /client|customer|cust/i.test(k)) || null;
  }
  if (!m.jobsAddress){
    m.jobsAddress = jCols.find(k => /addr|street|site(?!.*city)/i.test(k)) || null;
  }
  if (!m.jobsCity){
    m.jobsCity = jCols.find(k => /city|state/i.test(k)) || null;
  }
  // value-based fallbacks over generic field_N columns (skip known Title/field_1 job#/name)
  const generic = jCols.filter(k => !["Title","field_1"].includes(k) && k!==m.jobsClient && k!==m.jobsAddress && k!==m.jobsCity);
  if (!m.jobsCity){
    m.jobsCity = generic.find(k => jVals(k).length && jVals(k).every(looksCity)) || null;
  }
  if (!m.jobsAddress){
    m.jobsAddress = generic.find(k => k!==m.jobsCity && jVals(k).length && jVals(k).filter(looksAddress).length >= jVals(k).length*0.7) || null;
  }
  if (!m.jobsClient && CLIENTS.length){
    // the Jobs column whose values appear in some Clients column
    let best = null, bestHits = 0;
    for (const jc of generic){
      if (jc === m.jobsAddress || jc === m.jobsCity) continue;
      const vals = new Set(jVals(jc).map(String));
      if (!vals.size) continue;
      for (const cc of cCols){
        const hits = CLIENTS.filter(r => vals.has(String(r[cc]))).length;
        if (hits > bestHits){ bestHits = hits; best = {jobs: jc, clients: cc}; }
      }
    }
    if (best && bestHits > 0){ m.jobsClient = best.jobs; if (!m.clientsKey) m.clientsKey = best.clients; }
  }
  if (CLIENTS.length){
    if (!m.clientsKey && m.jobsClient){
      const vals = new Set(jVals(m.jobsClient).map(String));
      m.clientsKey = cCols.find(cc => CLIENTS.some(r => vals.has(String(r[cc])))) || null;
    }
    if (!m.clientsName){
      m.clientsName = cCols.find(k => /name/i.test(k)) ||
        cCols.find(k => k !== m.clientsKey && CLIENTS.filter(r => typeof r[k]==="string" && /[a-z]{3}/i.test(r[k]||"")).length >= CLIENTS.length*0.7) ||
        "Title";
    }
  }
  MAP = m;
}

/* ---------- load ---------- */
async function init(keepSel){
  banner("Loading data from SharePoint…","ok");
  try{
    const [jobs, items, clients] = await Promise.all([
      spGetAll(CONFIG.lists.jobs, "$top=4999"),
      spGetAll(CONFIG.lists.items, "$select=Id,Title,field_1,field_2,field_3,field_4,field_5&$top=4999"),
      spGetAll(CONFIG.lists.clients, "$top=4999").catch(()=>[])
    ]);
    JOBS = jobs;
    CLIENTS = clients;
    JOBITEMS = items
      .filter(r => r.Title && r.field_3 && (r.field_4 || r.field_5 != null))
      .map(r => ({
        job: String(r.Title).trim(),
        name: r.field_1 || "",
        section: r.field_2 || "Base Contract",
        item: String(r.field_3).trim(),
        unit: r.field_4 || "",
        contractQty: (typeof r.field_5 === "number") ? r.field_5 : (r.field_5 != null && r.field_5 !== "" && !isNaN(Number(r.field_5)) ? Number(r.field_5) : null)
      }));
    detectMap();
    banner(`Live data loaded — ${JOBS.length} jobs, ${JOBITEMS.length} contract items · ${new Date().toLocaleString("en-US",{dateStyle:"medium",timeStyle:"short"})}`,"ok");
    buildJobSelect(keepSel);
  }catch(e){
    banner("Couldn't load from SharePoint: "+esc(e.message)+". Check your internet connection, then hit Refresh data. If it keeps failing, the flow URL or passcode in CONFIG may have changed.","err");
    $("out").className="placeholder";
    $("out").innerHTML="No data loaded.";
  }
}

async function loadDaily(job){
  if (DAILY_CACHE[job]) return DAILY_CACHE[job];
  const rows = await spGetAll(CONFIG.lists.daily,
    "$select=Id,Title,JobNumber,WorkDate,Foreman,Quantity,Unit,Notes&$filter=JobNumber eq '" + spQuote(job) + "'&$top=4999");
  const entries = rows.filter(r => r.WorkDate).map(r => ({
    date: String(r.WorkDate).slice(0,10),
    item: String(r.Title||"").trim(),
    qty: (typeof r.Quantity === "number") ? r.Quantity : 0,
    unit: r.Unit || "",
    foreman: r.Foreman || "",
    notes: r.Notes || ""
  }));
  DAILY_CACHE[job] = entries;
  return entries;
}

/* ---------- UI ---------- */
function jobRow(job){ return JOBS.find(r => String(r.Title).trim() === job) || null; }
function jobInfo(job){
  const jr = jobRow(job);
  const itemRow = JOBITEMS.find(j => j.job === job);
  const name = (jr && jr.field_1) || (itemRow && itemRow.name) || job;
  let client = "—", addr = "—";
  if (jr){
    if (MAP.jobsClient && jr[MAP.jobsClient] != null && jr[MAP.jobsClient] !== ""){
      const raw = jr[MAP.jobsClient];
      client = String(raw);
      if (MAP.clientsKey && MAP.clientsName){
        const cr = CLIENTS.find(c => String(c[MAP.clientsKey]) === String(raw));
        if (cr && cr[MAP.clientsName]) client = String(cr[MAP.clientsName]);
      }
    }
    const parts = [];
    if (MAP.jobsAddress && jr[MAP.jobsAddress]) parts.push(String(jr[MAP.jobsAddress]));
    if (MAP.jobsCity && jr[MAP.jobsCity]) parts.push(String(jr[MAP.jobsCity]));
    if (parts.length) addr = parts.join(", ");
  }
  return { name, client, addr };
}
function buildJobSelect(keep){
  const fromJobs = JOBS.map(r => String(r.Title).trim()).filter(Boolean);
  const fromItems = JOBITEMS.map(j => j.job);
  const jobs = [...new Set(fromJobs.concat(fromItems))].sort();
  const prev = keep ? $("jobSel").value : null;
  $("jobSel").innerHTML = `<option value="">— select job —</option>` + jobs.map(j => {
    const info = jobInfo(j);
    return `<option value="${esc(j)}">${esc(j)} — ${esc(info.name)}</option>`;
  }).join("");
  if (prev) $("jobSel").value = prev;
  onJobChange(keep);
}
function firstLastOfMonth(ym){
  const [y,m] = ym.split("-").map(Number);
  const last = new Date(y, m, 0).getDate();
  return [ym+"-01", ym+"-"+String(last).padStart(2,"0")];
}
async function onJobChange(keepDates){
  const job = $("jobSel").value;
  if (!job){ render([]); return; }
  $("out").className = "placeholder";
  $("out").innerHTML = "Loading daily entries for " + esc(job) + "…";
  let entries;
  try { entries = await loadDaily(job); }
  catch(e){ banner("Couldn't load daily entries: " + esc(e.message), "err"); return; }
  if (!keepDates || !$("startD").value){
    const ds = entries.map(d => d.date).sort();
    if (ds.length){
      const [s,e] = firstLastOfMonth(ds[ds.length-1].slice(0,7));
      $("startD").value = s; $("endD").value = e;
    } else { $("startD").value = ""; $("endD").value = ""; }
  }
  render(entries);
}
function preset(which){
  const now = new Date();
  if (which === "this"){
    const ym = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0");
    const [s,e] = firstLastOfMonth(ym); $("startD").value = s; $("endD").value = e;
  } else if (which === "last"){
    const d = new Date(now.getFullYear(), now.getMonth()-1, 1);
    const ym = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
    const [s,e] = firstLastOfMonth(ym); $("startD").value = s; $("endD").value = e;
  } else if (which === "all"){
    const job = $("jobSel").value;
    const ds = (DAILY_CACHE[job]||[]).map(d => d.date).sort();
    if (ds.length){ $("startD").value = ds[0]; $("endD").value = ds[ds.length-1]; }
  }
  rerender();
}
function rerender(){ const job = $("jobSel").value; render(job ? (DAILY_CACHE[job]||[]) : []); }

/* ---------- report ---------- */
function pKey(job,s,e,item){ return job+"|"+s+"|"+e+"|"+item; }
function dLabel(iso){
  const [y,m,d] = iso.split("-").map(Number);
  return new Date(y, m-1, d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}

function render(allEntries){
  const job = $("jobSel").value, start = $("startD").value, end = $("endD").value;
  const out = $("out");
  if (!job || !start || !end){ out.className = "placeholder"; out.innerHTML = "Select a job and a date range above to generate the billing report."; return; }
  if (start > end){ out.className = "placeholder"; out.innerHTML = "⚠ The From date is after the Through date."; return; }
  out.className = "";

  const info = jobInfo(job);
  const entries = allEntries.filter(d => d.date >= start && d.date <= end);
  const items = JOBITEMS.filter(j => j.job === job);
  const itemMap = {}; items.forEach(j => itemMap[j.item.toLowerCase()] = j);

  const measured = {}, concrete = {}, unmatched = [];
  entries.forEach(d => {
    const it = d.item;
    if (/^concrete poured/i.test(it)){
      const sup = (it.split("—")[1] || it.split(" - ")[1] || "Supplier").trim();
      concrete[sup] = (concrete[sup]||0) + d.qty;
    } else if (/^extra work/i.test(it)){
      /* excluded until the office adds a Change Orders line to JobItems */
    } else if (itemMap[it.toLowerCase()]){
      const key = itemMap[it.toLowerCase()].item;
      measured[key] = (measured[key]||0) + d.qty;
    } else {
      unmatched.push(d);
    }
  });

  const extraKey = job+"|"+start+"|"+end;
  const added = extraProjRows[extraKey] || [];
  const shownItems = new Set([...Object.keys(measured), ...added]);

  const sections = {"Base Contract":[], "Change Orders":[]};
  shownItems.forEach(name => {
    const ji = itemMap[name.toLowerCase()];
    const sec = (ji && /change/i.test(ji.section)) ? "Change Orders" : "Base Contract";
    sections[sec].push({ item:name, unit: ji?ji.unit:"", contractQty: ji?ji.contractQty:null,
      measured: measured[name]||0, added: added.includes(name) && !(name in measured) });
  });
  Object.values(sections).forEach(a => a.sort((x,y) => x.item.localeCompare(y.item)));

  const periodLabel = dLabel(start) + " – " + dLabel(end);
  const rowHtml = r => {
    const k = pKey(job,start,end,r.item);
    const proj = projections[k]||0;
    return `<tr>
      <td>${esc(r.item)}${r.added?` <button class="remove-x" title="Remove row" onclick="removeProjRow('${esc(r.item).replace(/'/g,"\\'")}')">✕</button>`:""}</td>
      <td class="unit">${esc(r.unit)}</td>
      <td class="num">${r.contractQty!=null?fmt(r.contractQty):"—"}</td>
      <td class="num qty">${fmt(r.measured)}</td>
      <td class="num"><input class="proj-input" type="number" min="0" step="any" value="${proj||""}" placeholder="0"
          onchange="setProj('${esc(k.replace(/'/g,"\\'"))}',this.value)"></td>
      <td class="num billtotal">${fmt(r.measured+proj)}</td>
    </tr>`;
  };
  const secHtml = (title, rows) => {
    if (!rows.length) return "";
    return `<h3 class="sec">${title}</h3>
    <table><thead><tr>
      <th style="width:38%">Item</th><th>Unit</th><th class="num">Contract Qty</th>
      <th class="num">Measured</th><th class="num">Projection</th><th class="num">Total for Billing</th>
    </tr></thead><tbody>${rows.map(rowHtml).join("")}</tbody></table>`;
  };

  const concSups = Object.keys(concrete).sort();
  const concTotal = concSups.reduce((a,s) => a+concrete[s], 0);
  const projItems = items.filter(j => !shownItems.has(j.item));
  const genStamp = new Date().toLocaleString("en-US",{dateStyle:"medium",timeStyle:"short"});

  out.innerHTML = `<div id="reportWrap">
    <div class="rep-head">
      <div>
        <h2>Billing Report</h2>
        <div class="sub">Daily measurement quantities — for invoicing</div>
      </div>
      <div class="month"><div class="m">${periodLabel}</div><div class="g">Generated ${genStamp}</div></div>
    </div>
    <div class="info-grid">
      <div class="cell"><div class="k">Job</div><div class="v">${esc(job)} — ${esc(info.name)}</div></div>
      <div class="cell"><div class="k">PO #</div><div class="v">${esc(job)}</div></div>
      <div class="cell"><div class="k">Client</div><div class="v">${esc(info.client)}</div></div>
      <div class="cell"><div class="k">Address</div><div class="v">${esc(info.addr)}</div></div>
      <div class="cell"><div class="k">Period</div><div class="v">${periodLabel}</div></div>
      <div class="cell"><div class="k">Entries</div><div class="v">${entries.length} daily record${entries.length===1?"":"s"}</div></div>
    </div>

    ${secHtml("Base Contract", sections["Base Contract"])}
    ${secHtml("Change Orders", sections["Change Orders"])}
    ${(!sections["Base Contract"].length && !sections["Change Orders"].length)?`<div class="none-note">No billable measurement entries between ${dLabel(start)} and ${dLabel(end)}.</div>`:""}

    <div class="addproj no-print">
      <select id="addProjSel">
        <option value="">— add an item for projection —</option>
        ${projItems.map(j=>`<option value="${esc(j.item).replace(/"/g,"&quot;")}">${/change/i.test(j.section)?"[CO] ":""}${esc(j.item)} (${esc(j.unit)})</option>`).join("")}
      </select>
      <button class="btn" onclick="addProjRow()">Add projection row</button>
    </div>

    <div class="concrete">
      <div class="cap">Concrete Poured — ${periodLabel}</div>
      <table><thead><tr><th>Supplier</th><th class="num">Cubic Yards</th></tr></thead>
      <tbody>
        ${concSups.length?concSups.map(s=>`<tr><td>${esc(s)}</td><td class="num qty">${fmt(concrete[s])} CY</td></tr>`).join(""):`<tr><td colspan="2" class="none-note">No concrete deliveries logged this period.</td></tr>`}
        ${concSups.length?`<tr class="total-row"><td>Total Concrete</td><td class="num">${fmt(concTotal)} CY</td></tr>`:""}
      </tbody></table>
    </div>

    ${unmatched.length?`<div class="review no-print"><b>⚠ ${unmatched.length} entr${unmatched.length>1?"ies":"y"} didn't match a JobItems line (not included above — check item names or add the CO line in JobItems):</b>
      <ul>${unmatched.map(d=>`<li>${esc(d.date)} · ${esc(d.item)} · ${fmt(d.qty)} ${esc(d.unit)} (${esc(d.foreman)})</li>`).join("")}</ul></div>`:""}

    <div class="sig">
      <div class="line">Prepared by / Date</div>
      <div class="line">Approved for invoicing / Date</div>
    </div>
    <div class="foot"><span>Homestead Paving Co. — SharePoint Daily Quantities</span><span>Job ${esc(job)} · ${periodLabel}</span></div>
  </div>`;
}

/* ---------- projections ---------- */
function setProj(key,val){ const n=parseFloat(val); if(!n){delete projections[key];}else{projections[key]=n;} rerender(); }
function addProjRow(){
  const sel = $("addProjSel");
  if (!sel || !sel.value) return;
  const key = $("jobSel").value+"|"+$("startD").value+"|"+$("endD").value;
  (extraProjRows[key] = extraProjRows[key]||[]).push(sel.value);
  rerender();
}
function removeProjRow(item){
  const j=$("jobSel").value, s=$("startD").value, e=$("endD").value;
  const key = j+"|"+s+"|"+e;
  extraProjRows[key] = (extraProjRows[key]||[]).filter(i => i!==item);
  delete projections[pKey(j,s,e,item)];
  rerender();
}

/* ---------- data check panel ---------- */
function diagHtml(){
  const row = (label, col, sample) =>
    `<tr><td>${label}</td><td class="${col?"mapped":"unmapped"}">${col||"NOT MAPPED"}</td><td>${esc(sample!=null?String(sample).slice(0,60):"")}</td></tr>`;
  const jr = JOBS[0]||{}, cr = CLIENTS[0]||{};
  const colTable = (title, r) => {
    const cols = dataCols(r);
    return `<h4>${title} — columns</h4><table><thead><tr><th>Column</th><th>Sample value</th></tr></thead><tbody>`+
      cols.map(k=>`<tr><td>${esc(k)}</td><td>${esc(r[k]!=null?String(r[k]).slice(0,70):"")}</td></tr>`).join("")+`</tbody></table>`;
  };
  return `<b>Data check</b> — ${JOBS.length} jobs · ${JOBITEMS.length} job items · ${CLIENTS.length} clients loaded.
    <h4>Report header mapping (auto-detected; override in CONFIG.map at the top of this file)</h4>
    <table><thead><tr><th>Report field</th><th>Column used</th><th>Sample</th></tr></thead><tbody>
      ${row("Client (Jobs list)", MAP.jobsClient, MAP.jobsClient?jr[MAP.jobsClient]:null)}
      ${row("Address (Jobs list)", MAP.jobsAddress, MAP.jobsAddress?jr[MAP.jobsAddress]:null)}
      ${row("City/State (Jobs list)", MAP.jobsCity, MAP.jobsCity?jr[MAP.jobsCity]:null)}
      ${row("Client match key (Clients list)", MAP.clientsKey, MAP.clientsKey?cr[MAP.clientsKey]:null)}
      ${row("Client display name (Clients list)", MAP.clientsName, MAP.clientsName?cr[MAP.clientsName]:null)}
    </tbody></table>
    ${colTable("Jobs list", jr)}
    ${colTable("Clients list", cr)}`;
}
$("diagBtn").addEventListener("click", () => {
  const d = $("diag");
  if (d.style.display === "none"){ d.innerHTML = diagHtml(); d.style.display = "block"; }
  else d.style.display = "none";
});

$("jobSel").addEventListener("change", () => onJobChange(false));
$("startD").addEventListener("change", rerender);
$("endD").addEventListener("change", rerender);
$("printBtn").addEventListener("click", () => window.print());
$("reloadBtn").addEventListener("click", () => { DAILY_CACHE={}; init(true); });
init(false);
</script>
</body>
</html>
