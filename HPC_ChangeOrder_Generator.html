<title>Change Order Generator — Homestead Paving Co.</title>
<!--
  HOMESTEAD PAVING CO. — STANDALONE CHANGE ORDER GENERATOR
  =========================================================
  Creates printable change-order documents in the same format as the
  office CO form, WITHOUT touching the SharePoint lists. Use for change
  orders that do not originate from a field extra-work flag.

  - No setup, no PIN. Works fully offline.
  - Client and job dropdowns refresh live from the Jobs SharePoint list
    when CONFIG below is filled in; the lists embedded in this file are
    the offline fallback (client address blocks stay embedded unless an
    optional Clients list exists).
  - Prepared By and per-job customer blocks are remembered on this
    device using the SAME localStorage keys as the office form.
  - This tool does NOT write to the Change Order Log. The CO Log remains
    the system of record for field-originated COs (see handoff specs).
-->
<style>
  :root{
    --ink:#1c1f23; --slab:#2e3440; --concrete:#eceae6; --card:#fff;
    --line:#d6d2cb; --accent:#e8a020; --good:#2e7d4f; --muted:#6b6f76; --danger:#b3402a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",Roboto,system-ui,sans-serif;background:var(--concrete);color:var(--ink);font-size:15px}
  button{font-family:inherit}
  header{background:var(--slab);color:#fff;padding:14px 18px;position:sticky;top:0;z-index:20;box-shadow:0 2px 6px rgba(0,0,0,.25)}
  .hdr-inner{max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .job-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700}
  h1{font-size:20px;font-weight:700}
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;border-radius:20px;padding:6px 14px;background:rgba(255,255,255,.12);color:#fff;cursor:pointer;border:none}
  .chip:hover{background:rgba(255,255,255,.2)}
  main{max-width:1080px;margin:0 auto;padding:16px 14px 90px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px}
  label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
  select,input[type=text],input[type=number],input[type=date],textarea{
    padding:9px 10px;font-size:15px;border:1.5px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);width:100%}
  select:focus,input:focus,textarea:focus{outline:3px solid rgba(232,160,32,.4);border-color:var(--accent)}
  textarea{min-height:74px;resize:vertical;line-height:1.4}
  .gen-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
  @media(max-width:720px){.gen-grid{grid-template-columns:1fr}}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .fld{margin-bottom:10px}
  .btn{border:none;border-radius:8px;padding:11px 20px;font-size:15px;font-weight:800;cursor:pointer}
  .btn-primary{background:var(--accent);color:var(--ink)}
  .btn-quiet{background:var(--slab);color:#fff;padding:11px 16px;font-size:14px;font-weight:700}
  .btn-del{background:none;border:none;color:var(--danger);font-size:18px;font-weight:800;cursor:pointer;padding:4px 8px}
  /* line item rows */
  table.li{width:100%;border-collapse:collapse}
  table.li th{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:left;padding:0 6px 4px 0}
  table.li td{padding:0 6px 8px 0;vertical-align:top}
  table.li td:last-child{width:34px;padding-right:0}
  .ext-cell{font-size:14px;color:var(--muted);white-space:nowrap;padding-top:12px !important;font-variant-numeric:tabular-nums}

  /* ---- the printable document (same as office form) ---- */
  .codoc{background:#fff;border:1px solid var(--line);padding:36px 40px;margin-top:16px;color:#111;font-size:13px;line-height:1.35}
  .codoc .dhead{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
  .codoc h2{font-size:26px;margin:0 0 3px;font-weight:800;letter-spacing:0}
  .codoc .co-label{font-size:15px;font-weight:800;letter-spacing:.18em;color:#c0181f;margin-top:12px}
  .codoc .logo{width:88px;height:88px;flex:none}
  .codoc .logo img{width:100%;height:100%;object-fit:contain}
  .codoc .mono{width:88px;height:88px;border-radius:50%;background:#c0181f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;font-family:Georgia,serif}
  .codoc .meta{display:flex;gap:20px;margin-top:18px;align-items:flex-start}
  .codoc .cust{flex:1;min-width:0}
  .codoc .redbar{background:#c0181f;color:#fff;font-weight:800;padding:3px 8px;font-size:13px}
  .codoc .cust .custtext{white-space:pre-wrap;margin:7px 2px 0}
  .codoc table.kv{border-collapse:collapse;flex:none}
  .codoc table.kv td{border:1px solid #333;padding:3px 12px;font-size:12.5px;min-width:150px;text-align:center}
  .codoc table.kv td.k{border:none;font-weight:800;text-align:right;padding-right:10px;min-width:0}
  .codoc table.items{width:100%;border-collapse:collapse;margin-top:20px}
  .codoc table.items th{background:#c0181f;color:#fff;text-align:left;padding:5px 8px;font-size:12.5px}
  .codoc table.items th.r,.codoc table.items td.r{text-align:right}
  .codoc table.items td{padding:6px 8px;border-bottom:1px solid #ddd;font-variant-numeric:tabular-nums;vertical-align:top}
  .codoc .total{text-align:right;font-weight:800;font-size:14px;margin-top:12px}
  .codoc .scope{margin-top:18px;white-space:pre-wrap}
  .codoc .sig{margin-top:56px;display:flex;gap:48px}
  .codoc .sig > div{flex:1;border-top:1px solid #111;padding-top:5px;font-size:12px}

  @media print{
    header,.panel,.toast{display:none !important}
    body{background:#fff}
    main{max-width:none;padding:0}
    .codoc{border:none;padding:0;margin:0;font-size:12.5px}
  }
  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:99;background:var(--good);color:#fff;font-weight:700;padding:12px 22px;border-radius:9px;box-shadow:0 4px 14px rgba(0,0,0,.3);opacity:0;transition:opacity .25s;pointer-events:none;font-size:15px}
  .toast.show{opacity:1}
</style>

<body>

<header>
  <div class="hdr-inner">
    <div>
      <div class="job-eyebrow">Homestead Paving Co.</div>
      <h1>Change Order Generator</h1>
    </div>
    <button class="chip" id="btnPrint" type="button">🖨 Print / save as PDF</button>
  </div>
</header>

<main>
  <div class="panel">
    <div class="gen-grid">
      <div>
        <div class="fld">
          <label for="jobSel">Job</label>
          <select id="jobSel"><option value="">— pick a job, or type below —</option></select>
        </div>
        <div class="row2">
          <div class="fld"><label for="jobNum">Job #</label><input type="text" id="jobNum"></div>
          <div class="fld"><label for="jobName">Job name</label><input type="text" id="jobName"></div>
        </div>
        <div class="fld">
          <label for="clientSel">Client</label>
          <select id="clientSel"><option value="">— pick a client, or type below —</option></select>
        </div>
        <div class="fld">
          <label for="gCust">Customer block — exactly as it should print</label>
          <textarea id="gCust"></textarea>
        </div>
      </div>
      <div>
        <div class="row2">
          <div class="fld"><label for="gCoNum">CO #</label><input type="text" id="gCoNum"></div>
          <div class="fld"><label for="gDate">Date</label><input type="date" id="gDate"></div>
        </div>
        <div class="fld"><label for="gPrep">Prepared by</label><input type="text" id="gPrep" placeholder="Matt Rhodes"></div>
        <div class="fld">
          <label for="gScope">Scope notes (optional — prints under the table)</label>
          <textarea id="gScope" style="min-height:52px"></textarea>
        </div>
      </div>
    </div>

    <label style="margin-top:6px">Line items</label>
    <table class="li">
      <thead><tr><th style="width:44%">Description</th><th>Qty</th><th>Unit</th><th>Price each</th><th>Extended</th><th></th></tr></thead>
      <tbody id="liBody"></tbody>
    </table>
    <button class="btn btn-quiet" id="btnAddLine" type="button">＋ Add line item</button>
  </div>

  <div id="coDoc"></div>
</main>

<div class="toast" id="toast"></div>

<script>
// OPTIONAL: paste the same "HPC SharePoint Bridge" flow URL + secret key
// the tablets use to pull clients and jobs live from the SharePoint lists.
// Leave blank to use only the lists embedded below. Live data is cached on
// this device so the tool keeps working offline.
const CONFIG = {
  flowUrl: "https://default7255d6425eff4581966d707a3a5308.22.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/07/workflows/6f19392f03c34c24a5a3485c3286d98a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=oLQKpOyfLejIdVbMRtFRyxGNVm0b9n0vKEliznamO84",   // <-- SAME FLOW URL THE TABLETS USE (optional)
  apiKey:  "Princeton",   // <-- SAME SECRET KEY (optional)
  lists: { jobs: "Jobs", clients: "Clients" }   // Clients list is optional
};

/* ---------- SharePoint bridge helpers (shared across HPC files) ---------- */
function spConfigured(){ return !!(CONFIG.flowUrl && CONFIG.apiKey); }
async function sp(method, uri, body){
  const res = await fetch(CONFIG.flowUrl, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" }, // avoids CORS preflight
    body: JSON.stringify({
      key: CONFIG.apiKey, method: method, uri: uri,
      body: body ? JSON.stringify(body) : ""
    })
  });
  if(!res.ok) throw new Error("HTTP " + res.status);
  const text = await res.text();
  const data = text ? JSON.parse(text) : {};
  if(data && data.ok === false) throw new Error(data.error || "Bridge error");
  return data;
}
function spList(listTitle){
  return "_api/web/lists/getbytitle('" + encodeURIComponent(listTitle) + "')";
}
async function spGetAll(listTitle, query){
  let uri = spList(listTitle) + "/items?" + query;
  let out = [];
  for(let guard = 0; uri && guard < 50; guard++){
    const data = await sp("GET", uri);
    out = out.concat(data.value || []);
    let next = data["odata.nextLink"] || data["@odata.nextLink"] || null;
    if(next){ const i = next.indexOf("_api/"); uri = i >= 0 ? next.slice(i) : null; }
    else uri = null;
  }
  return out;
}

const UNITS = ["SQ FT","FT","EA","CY","LS","TON","HR","DAY"];

const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtMoney = n => n === "" || n == null || isNaN(n) ? "" :
  Number(n).toLocaleString("en-US",{style:"currency",currency:"USD"});
const fmtQty = n => n === "" || n == null || isNaN(n) ? "" :
  Number(n).toLocaleString("en-US",{maximumFractionDigits:2});
const fmtDate = d => { if(!d) return ""; const p = String(d).split("-");
  return p.length===3 ? `${p[1]}/${p[2]}/${p[0]}` : String(d); };

let lines = [];

// ---------- dropdowns (live from SharePoint when CONFIG is set; cached for offline) ----------
let clientList = CLIENTS, jobList = JOBS;
try { const c = JSON.parse(localStorage.getItem("hpc_clients") || "null"); if (Array.isArray(c) && c.length) clientList = c; } catch(e){}
try { const j = JSON.parse(localStorage.getItem("hpc_jobs") || "null"); if (Array.isArray(j) && j.length) jobList = j; } catch(e){}
function renderDropdowns(){
  $("jobSel").innerHTML = '<option value="">— pick a job, or type below —</option>' +
    jobList.map((j,i)=>`<option value="${i}">${esc(j.num)} — ${esc(j.name)}</option>`).join("");
  $("clientSel").innerHTML = '<option value="">— pick a client, or type below —</option>' +
    clientList.map((c,i)=>`<option value="${i}">${esc(c.name)}</option>`).join("");
}
async function refreshLists(){
  if (!spConfigured()) return;
  try {
    // Jobs list internal names: Title=JobNumber, field_1=JobName,
    // field_2=Client, field_4=Status (Active/Closed)
    const [clientItems, jobRows] = await Promise.all([
      spGetAll(CONFIG.lists.clients, "$select=Title,AddressBlock&$top=4999").catch(()=>[]),
      spGetAll(CONFIG.lists.jobs, "$select=Title,field_1,field_2,field_4&$top=4999")
    ]);
    // Optional Clients list (Title + AddressBlock). If it doesn't exist,
    // the client list embedded in this file keeps being used.
    const clients = clientItems.filter(c => c.Title)
      .map(c => ({ name: c.Title, block: c.AddressBlock || c.Title }));
    if (clients.length){
      clientList = clients; localStorage.setItem("hpc_clients", JSON.stringify(clientList));
    }
    const merged = jobRows
      .filter(r => r.Title && (r.field_4 || "Active") !== "Closed")
      .map(r => ({ num: String(r.Title).trim(), name: r.field_1 || "", client: r.field_2 || "" }))
      .sort((a,b)=> a.num.localeCompare(b.num, undefined, {numeric:true}));
    if (merged.length){
      jobList = merged; localStorage.setItem("hpc_jobs", JSON.stringify(jobList));
    }
    renderDropdowns();
  } catch(e){ /* offline — cached/embedded lists stay */ }
}
renderDropdowns();
refreshLists();

$("jobSel").onchange = () => {
  const v = $("jobSel").value;
  if (v === "") return;
  const j = jobList[Number(v)];
  $("jobNum").value = j.num;
  $("jobName").value = j.name;
  // saved customer for this job wins; otherwise auto-fill from the job's client
  const saved = localStorage.getItem("hpc_cust_" + j.num);
  if (saved){ $("gCust").value = saved; $("clientSel").value = ""; }
  else {
    const ci = clientList.findIndex(c => c.name === j.client);
    if (ci >= 0){ $("clientSel").value = ci; $("gCust").value = clientList[ci].block; }
  }
  renderDoc();
};
$("clientSel").onchange = () => {
  const v = $("clientSel").value;
  if (v === "") return;
  $("gCust").value = clientList[Number(v)].block;
  renderDoc();
};
$("gCust").addEventListener("input", () => { $("clientSel").value = ""; });

// ---------- line items ----------
function addLine(l){
  lines.push(l || { desc:"", qty:"", unit:"SQ FT", price:"" });
  renderLines();
}
function renderLines(){
  $("liBody").innerHTML = lines.map((l,i)=>`<tr data-i="${i}">
    <td><input type="text" class="l-desc" value="${esc(l.desc)}"></td>
    <td><input type="number" class="l-qty" step="any" min="0" value="${esc(l.qty)}" style="width:90px"></td>
    <td><select class="l-unit" style="width:90px">${UNITS.map(u=>`<option${u===l.unit?" selected":""}>${u}</option>`).join("")}</select></td>
    <td><input type="number" class="l-price" step="any" min="0" value="${esc(l.price)}" style="width:110px"></td>
    <td class="ext-cell">${l.qty!=="" && l.price!=="" ? fmtMoney(Number(l.qty)*Number(l.price)) : ""}</td>
    <td><button class="btn-del" title="Remove line" type="button">✕</button></td>
  </tr>`).join("");
  $("liBody").querySelectorAll("tr").forEach(tr=>{
    const i = Number(tr.dataset.i), l = lines[i];
    tr.querySelector(".l-desc").oninput  = e => { l.desc = e.target.value; renderDoc(); };
    tr.querySelector(".l-qty").oninput   = e => { l.qty = e.target.value; refreshExt(tr,l); renderDoc(); };
    tr.querySelector(".l-unit").onchange = e => { l.unit = e.target.value; renderDoc(); };
    tr.querySelector(".l-price").oninput = e => { l.price = e.target.value; refreshExt(tr,l); renderDoc(); };
    tr.querySelector(".btn-del").onclick = () => { lines.splice(i,1); renderLines(); renderDoc(); };
  });
}
function refreshExt(tr,l){
  tr.querySelector(".ext-cell").textContent =
    (l.qty!=="" && l.price!=="") ? fmtMoney(Number(l.qty)*Number(l.price)) : "";
}
$("btnAddLine").onclick = () => addLine();

// ---------- document ----------
function renderDoc(){
  let total = 0, anyMoney = false;
  const printable = lines.filter(l => l.desc.trim() || l.qty !== "" || l.price !== "");
  const trs = printable.map(l=>{
    const ext = (l.qty!=="" && l.price!=="") ? Number(l.qty)*Number(l.price) : "";
    if (ext !== ""){ total += ext; anyMoney = true; }
    return `<tr>
      <td>${esc(l.desc) || "(description pending)"}</td>
      <td class="r">${l.qty!=="" ? fmtQty(l.qty) : ""}</td>
      <td>${esc(l.unit)}</td>
      <td class="r">${l.price!=="" ? fmtMoney(l.price) : ""}</td>
      <td class="r">${ext!=="" ? fmtMoney(ext) : ""}</td>
    </tr>`;
  }).join("");
  const logo = LOGO ? `<div class="logo"><img src="${LOGO}" alt="logo"></div>` : `<div class="mono">HP</div>`;
  const prep = $("gPrep").value.trim(), scope = $("gScope").value.trim();
  $("coDoc").innerHTML = `
  <div class="codoc">
    <div class="dhead">
      <div>
        <h2>${esc(COMPANY.name)}</h2>
        ${COMPANY.lines.map(l=>`<div>${esc(l)}</div>`).join("")}
        ${prep ? `<div>Prepared By: ${esc(prep)}</div>` : ""}
        <div class="co-label">CHANGE ORDER${$("gCoNum").value.trim() ? " #"+esc($("gCoNum").value.trim()) : ""}</div>
      </div>
      ${logo}
    </div>
    <div class="meta">
      <div class="cust">
        <div class="redbar">Customer</div>
        <div class="custtext">${esc($("gCust").value) || "&nbsp;"}</div>
      </div>
      <table class="kv">
        <tr><td class="k">DATE:</td><td>${fmtDate($("gDate").value)}</td></tr>
        <tr><td class="k">JOB NAME:</td><td>${esc($("jobName").value)}</td></tr>
        <tr><td class="k">JOB #:</td><td>${esc($("jobNum").value)}</td></tr>
        <tr><td class="k">CO #:</td><td>${esc($("gCoNum").value.trim()) || "&nbsp;"}</td></tr>
      </table>
    </div>
    <table class="items">
      <tr><th>Description</th><th class="r">Qty</th><th>Unit</th><th class="r">Price Each</th><th class="r">Price Total</th></tr>
      ${trs || `<tr><td colspan="5" style="color:#888">No line items yet.</td></tr>`}
    </table>
    ${anyMoney ? `<div class="total">Change Order Total: ${fmtMoney(total)}</div>` : ""}
    ${scope ? `<div class="scope">${esc(scope)}</div>` : ""}
    <div class="sig">
      <div>Approved By</div>
      <div>Date</div>
    </div>
  </div>`;
}
["gCust","gPrep","gCoNum","gDate","gScope","jobNum","jobName"].forEach(id =>
  $(id).addEventListener("input", renderDoc));

$("btnPrint").onclick = () => {
  const jn = $("jobNum").value.trim();
  if (jn) localStorage.setItem("hpc_cust_" + jn, $("gCust").value);
  localStorage.setItem("hpc_prepared_by", $("gPrep").value);
  window.print();
};

// ---------- boot ----------
$("gDate").value = new Date().toISOString().slice(0,10);
$("gPrep").value = localStorage.getItem("hpc_prepared_by") || "";
addLine();
renderDoc();
</script>
<script>
// Offline support when hosted as a website (GitHub Pages): cache this page
// on the tablet so it still opens with no signal. Saved days already queue
// locally and sync when back online.
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(function(){});
}
